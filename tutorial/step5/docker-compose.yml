services:
  firely:
    image: firely/server:6.7.0
    ports:
      - "4080:4080"
    volumes:
      - ./../../.secret/firelyserver-license.json:/app/firely-license.json
      - ./appsettings.json:/app/appsettings.json:ro
      - ./cdrs.yml:/app/cdrs.yml:ro
      - ./../../.plugins:/app/plugins:ro
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7
    command: ["mongod", "--logpath", "/dev/null"]
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  openfhir:
    image: openfhir/openfhir:latest
    container_name: openfhir
    ports:
      - "8083:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://admin:admin@mongodb:27017/openfhir?authSource=admin
      - SPRING_DATA_MONGODB_DATABASE=openfhir
      - OPENFHIR_DB_TYPE=mongo
    volumes:
      - ./../../fhirconnect/:/app/bootstrap/:ro
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb-data:
